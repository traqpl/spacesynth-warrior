name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, space-warrior]
    env:
      TMPDIR: ${{ github.workspace }}/.tmp
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Reset self-hosted workspace with sudo
        run: |
          sudo mkdir -p "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
            ! -name '_temp' \
            ! -name '_actions' \
            ! -name '_tool' \
            -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          clean: false

      - name: Clean workspace caches with sudo
        run: sudo rm -rf "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Prepare Go workspace directories
        run: mkdir -p "$TMPDIR" "$GOCACHE" "$GOMODCACHE"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Deploy on agent host
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          make deploy-agent \
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/spacesynth-warrior}" \
            PORT="${DEPLOY_PORT:-8080}"
