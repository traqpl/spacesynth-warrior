name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: [self-hosted, Linux, X64, space-warrior]
    env:
      TMPDIR: ${{ github.workspace }}/.tmp
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

    steps:
      - name: Reset self-hosted workspace with sudo
        run: |
          sudo mkdir -p "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
            ! -name '_temp' \
            ! -name '_actions' \
            ! -name '_tool' \
            -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Clean workspace caches with sudo
        run: sudo rm -rf "$TMPDIR" "$GOCACHE" "$GOMODCACHE" .artifacts

      - name: Prepare Go workspace directories
        run: mkdir -p "$TMPDIR" "$GOCACHE" "$GOMODCACHE" .artifacts

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build server
        run: go build -ldflags="-s -w" -o .artifacts/server ./cmd/server/

      - name: Build WASM game
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o .artifacts/game.wasm ./cmd/game/
